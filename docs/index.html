<!-- Sonitrix Web (v1) -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Sonitrix: (WEB)</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link href="index.css" rel="stylesheet"/>
  </head>
  <body>
    <div class="parent">
      <div id="selector">
        <div>Current Frequency: NONE</div>
        <div class="selection" id="default-selection">19.5 kHz</div>
        <div class="selection" id="stop-emission">STOP EMISSION</div>
        <div class="selection" id="next-frequency">NEXT FREQUENCY</div>
        <div class="selection" id="enter-custom">Enter new frequency</div>
        <p id="emission-status" class="blink-fade">EMITTING</p>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
